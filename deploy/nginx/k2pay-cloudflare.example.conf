# K2Pay + Cloudflare 示例 Nginx 配置
# 适用: 域名已在 Cloudflare 橙云代理，源站 Nginx 反代本机 K2Pay (默认 127.0.0.1:6088)
#
# 前置:
#   1. Cloudflare SSL/TLS = Full (strict)
#   2. sudo bash scripts/update-cloudflare-realip.sh
#   3. 源站防火墙仅放行 Cloudflare IP（或至少不要对全世界暴露 6088）
#   4. /etc/k2pay/config.yaml:
#        security.trusted_proxies: ["127.0.0.1", "::1"]
#        security.trust_cloudflare: true
#
# 证书可选:
#   A) Cloudflare Origin Certificate 放到 /etc/ssl/k2pay/
#   B) 继续使用 Let's Encrypt（DNS 挑战或临时灰云申请）

upstream k2pay_backend {
    server 127.0.0.1:6088;
    keepalive 32;
}

# HTTP → HTTPS（ACME 若用 DNS 验证可整段跳转）
server {
    listen 80;
    listen [::]:80;
    server_name pay.example.com;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type text/plain;
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name pay.example.com;

    # --- 证书（按实际路径修改）---
    ssl_certificate     /etc/letsencrypt/live/pay.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pay.example.com/privkey.pem;
    # 或 Origin CA:
    # ssl_certificate     /etc/ssl/k2pay/origin.pem;
    # ssl_certificate_key /etc/ssl/k2pay/origin.key;

    # --- Cloudflare 真实 IP（必须）---
    include /etc/nginx/snippets/cloudflare-realip.conf;

    client_max_body_size 50m;

    # 可选: 管理后台额外限制（示例，按需启用）
    # location /admin {
    #     allow 203.0.113.10;
    #     deny all;
    #     proxy_pass http://k2pay_backend;
    #     include /etc/nginx/snippets/k2pay-proxy-headers.conf;
    # }

    location / {
        proxy_pass http://k2pay_backend;
        proxy_http_version 1.1;
        proxy_read_timeout 120s;

        proxy_set_header Host              $host;
        # real_ip 生效后 $remote_addr 已是访客/商户真实 IP
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # 透传 CF 头，供 K2Pay trust_cloudflare 使用
        proxy_set_header CF-Connecting-IP  $http_cf_connecting_ip;
        proxy_set_header CF-Ray            $http_cf_ray;
        proxy_set_header CF-Visitor        $http_cf_visitor;
    }
}
