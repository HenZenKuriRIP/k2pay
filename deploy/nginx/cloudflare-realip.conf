# Cloudflare 真实客户端 IP 还原（由 scripts/update-cloudflare-realip.sh 生成/更新）
# 在 server { } 内: include /etc/nginx/snippets/cloudflare-realip.conf;
#
# 官方 IP 列表会变化，请定期执行:
#   sudo bash /path/to/k2pay/scripts/update-cloudflare-realip.sh
#
# 以下为安装脚本首次生成时的占位；update 脚本会覆盖为本机当前 CF 段。

# IPv4（占位，运行 update-cloudflare-realip.sh 后会被替换）
# set_real_ip_from 173.245.48.0/20;
# ...

real_ip_header CF-Connecting-IP;
real_ip_recursive on;
